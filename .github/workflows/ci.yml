# Checks that the project lints, typechecks, and builds successfully
name: CI

on:
  pull_request:
  push:
    branches: [ main, dev ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: 22
  DATABASE_URL: "postgresql://user:password@localhost:5432/dbname"
  NUXT_SITE_URL: "https://hackathon.cslabs.be"
  NUXT_PUBLIC_SITE_URL: "https://hackathon.cslabs.be"
  SUPABASE_URL: "https://supabase-hackathon.cslabs.be"

jobs:
  checks:
    name: Lint and typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node + pnpm and install dependencies
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          database-url: ${{ env.DATABASE_URL }}

      - name: ESLint
        run: pnpm run lint

      - name: Nuxt typecheck
        run: pnpm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: checks
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node + pnpm and install dependencies
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          database-url: ${{ env.DATABASE_URL }}

      - name: Nuxt build
        run: pnpm run build
